<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Jalsa Hotel & Resort</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; }
  .tab-btn.active { background: #154734; color: white; }
  .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; text-transform: uppercase; }
  .badge-confirmed { background: #d1fae5; color: #065f46; }
  .badge-pending   { background: #fef9c3; color: #78350f; }
  .badge-cancelled { background: #fee2e2; color: #991b1b; }
  .loading { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body class="bg-gray-50 text-gray-800">

<!-- Login screen -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center">
  <div class="bg-white shadow-xl rounded-lg p-10 w-full max-w-sm border border-yellow-200">
    <h1 class="text-2xl font-bold text-green-900 mb-2">Jalsa Admin</h1>
    <p class="text-gray-500 text-sm mb-6">Sign in to manage the resort</p>
    <input id="loginEmail" type="email" placeholder="Email" class="w-full border rounded px-3 py-2 mb-3 text-sm focus:outline-none focus:border-green-700">
    <input id="loginPassword" type="password" placeholder="Password" class="w-full border rounded px-3 py-2 mb-4 text-sm focus:outline-none focus:border-green-700">
    <button onclick="doLogin()" class="w-full bg-green-900 text-white py-2 rounded font-semibold text-sm hover:bg-green-800 transition">Sign In</button>
    <p id="loginError" class="text-red-600 text-xs mt-3 hidden"></p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">
  <!-- Topbar -->
  <nav class="bg-green-900 text-white px-6 py-4 flex justify-between items-center">
    <span class="font-bold text-lg">🏨 Jalsa Admin Panel</span>
    <div class="flex items-center gap-4">
      <span id="adminName" class="text-sm text-green-200"></span>
      <button onclick="logout()" class="text-xs bg-green-700 hover:bg-green-600 px-3 py-1 rounded">Logout</button>
    </div>
  </nav>

  <!-- Stats bar -->
  <div id="statsBar" class="grid grid-cols-2 md:grid-cols-6 gap-4 px-6 py-4 bg-white border-b">
    <div class="text-center"><p class="text-2xl font-bold text-green-900" id="stat-bookings">–</p><p class="text-xs text-gray-500">Bookings</p></div>
    <div class="text-center"><p class="text-2xl font-bold text-green-900" id="stat-reservations">–</p><p class="text-xs text-gray-500">Reservations</p></div>
    <div class="text-center"><p class="text-2xl font-bold text-yellow-600" id="stat-enquiries">–</p><p class="text-xs text-gray-500">Unread Enquiries</p></div>
    <div class="text-center"><p class="text-2xl font-bold text-yellow-600" id="stat-reviews">–</p><p class="text-xs text-gray-500">Pending Reviews</p></div>
    <div class="text-center"><p class="text-2xl font-bold text-green-900" id="stat-newsletter">–</p><p class="text-xs text-gray-500">Subscribers</p></div>
    <div class="text-center"><button onclick="loadDashboard()" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded">↻ Refresh</button></div>
  </div>

  <!-- Tabs -->
  <div class="flex gap-2 px-6 pt-4 flex-wrap">
    <button class="tab-btn active px-4 py-2 rounded text-sm font-medium bg-gray-200 text-gray-700" onclick="switchTab('bookings', this)">Room Bookings</button>
    <button class="tab-btn px-4 py-2 rounded text-sm font-medium bg-gray-200 text-gray-700" onclick="switchTab('reservations', this)">Table Reservations</button>
    <button class="tab-btn px-4 py-2 rounded text-sm font-medium bg-gray-200 text-gray-700" onclick="switchTab('menu', this)">Menu</button>
    <button class="tab-btn px-4 py-2 rounded text-sm font-medium bg-gray-200 text-gray-700" onclick="switchTab('rooms', this)">Rooms</button>
    <button class="tab-btn px-4 py-2 rounded text-sm font-medium bg-gray-200 text-gray-700" onclick="switchTab('gallery', this)">Gallery</button>
    <button class="tab-btn px-4 py-2 rounded text-sm font-medium bg-gray-200 text-gray-700" onclick="switchTab('reviews', this)">Reviews</button>
    <button class="tab-btn px-4 py-2 rounded text-sm font-medium bg-gray-200 text-gray-700" onclick="switchTab('enquiries', this)">Enquiries</button>
    <button class="tab-btn px-4 py-2 rounded text-sm font-medium bg-gray-200 text-gray-700" onclick="switchTab('newsletter', this)">Newsletter</button>
  </div>

  <div id="tabContent" class="px-6 py-4"></div>
</div>

<script>
const API = window.location.origin + '/api';
let token = localStorage.getItem('jalsa_admin_token');

window.onload = () => {
  if (token) showDashboard();
};

// Escape a value for safe use inside an HTML attribute
const esc = (s) => String(s ?? '')
  .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
  .replace(/</g, '&lt;').replace(/>/g, '&gt;');

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) },
    ...opts,
  });
  if (!res.ok) throw await res.json();
  return res.json();
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  try {
    const data = await apiFetch('/admin/login', { method: 'POST', body: JSON.stringify({ email, password }) });
    token = data.token;
    localStorage.setItem('jalsa_admin_token', token);
    document.getElementById('adminName').textContent = data.admin.name;
    showDashboard();
  } catch (e) {
    const el = document.getElementById('loginError');
    el.textContent = e.error || 'Login failed';
    el.classList.remove('hidden');
  }
}

function showDashboard() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  loadDashboard();
  switchTab('bookings', document.querySelector('.tab-btn'));
}

function logout() {
  token = null;
  localStorage.removeItem('jalsa_admin_token');
  location.reload();
}

async function loadDashboard() {
  try {
    const d = await apiFetch('/admin/dashboard');
    document.getElementById('stat-bookings').textContent = d.totalBookings;
    document.getElementById('stat-reservations').textContent = d.totalReservations;
    document.getElementById('stat-enquiries').textContent = d.unreadEnquiries;
    document.getElementById('stat-reviews').textContent = d.pendingReviews;
    document.getElementById('stat-newsletter').textContent = d.newsletterCount;
  } catch (e) { console.error(e); }
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('tabContent');
  el.innerHTML = '<p class="text-gray-400 text-sm">Loading...</p>';
  tabs[tab]();
}

const statusBadge = (s) => `<span class="status-badge badge-${s}">${s}</span>`;

const tabs = {
  bookings: async () => {
    const data = await apiFetch('/admin/bookings');
    document.getElementById('tabContent').innerHTML = `
      <h2 class="font-bold text-lg mb-3 text-green-900">Room Bookings (${data.length})</h2>
      <div class="overflow-x-auto">
      <table class="w-full text-sm bg-white rounded shadow">
        <thead class="bg-gray-100"><tr>
          <th class="p-3 text-left">ID</th><th class="p-3 text-left">Guest</th><th class="p-3 text-left">Room</th>
          <th class="p-3 text-left">Check-in</th><th class="p-3 text-left">Check-out</th>
          <th class="p-3 text-left">Total</th><th class="p-3 text-left">Status</th><th class="p-3 text-left">Action</th>
        </tr></thead>
        <tbody>
          ${data.map(b => `<tr class="border-t hover:bg-gray-50">
            <td class="p-3">#${b.id}</td>
            <td class="p-3">${b.firstName} ${b.lastName}<br><span class="text-gray-400 text-xs">${b.email}</span></td>
            <td class="p-3">${b.room?.name || b.roomId}</td>
            <td class="p-3">${new Date(b.checkIn).toLocaleDateString()}</td>
            <td class="p-3">${new Date(b.checkOut).toLocaleDateString()}</td>
            <td class="p-3">₹${b.totalAmount.toLocaleString('en-IN')}</td>
            <td class="p-3">${statusBadge(b.status)}</td>
            <td class="p-3 flex gap-2">
              <button onclick="updateStatus('bookings',${b.id},'confirmed')" class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded hover:bg-green-200">Confirm</button>
              <button onclick="updateStatus('bookings',${b.id},'cancelled')" class="text-xs bg-red-100 text-red-800 px-2 py-1 rounded hover:bg-red-200">Cancel</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table></div>`;
  },

  reservations: async () => {
    const data = await apiFetch('/admin/reservations');
    document.getElementById('tabContent').innerHTML = `
      <h2 class="font-bold text-lg mb-3 text-green-900">Table Reservations (${data.length})</h2>
      <div class="overflow-x-auto">
      <table class="w-full text-sm bg-white rounded shadow">
        <thead class="bg-gray-100"><tr>
          <th class="p-3 text-left">ID</th><th class="p-3 text-left">Guest</th><th class="p-3 text-left">Date</th>
          <th class="p-3 text-left">Time</th><th class="p-3 text-left">Party</th><th class="p-3 text-left">Status</th><th class="p-3 text-left">Action</th>
        </tr></thead>
        <tbody>
          ${data.map(r => `<tr class="border-t hover:bg-gray-50">
            <td class="p-3">#${r.id}</td>
            <td class="p-3">${r.name}<br><span class="text-gray-400 text-xs">${r.email} / ${r.phone}</span></td>
            <td class="p-3">${new Date(r.date).toLocaleDateString()}</td>
            <td class="p-3">${r.time}</td>
            <td class="p-3">${r.partySize} pax</td>
            <td class="p-3">${statusBadge(r.status)}</td>
            <td class="p-3 flex gap-2">
              <button onclick="updateStatus('reservations',${r.id},'confirmed')" class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded">Confirm</button>
              <button onclick="updateStatus('reservations',${r.id},'cancelled')" class="text-xs bg-red-100 text-red-800 px-2 py-1 rounded">Cancel</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table></div>`;
  },

  menu: async () => {
    const cats = await apiFetch('/admin/menu');
    let html = `<div class="flex justify-between items-center mb-3">
      <h2 class="font-bold text-lg text-green-900">Menu Items</h2>
      <button onclick="showAddMenuItem()" class="bg-green-900 text-white text-xs px-4 py-2 rounded">+ Add Item</button>
    </div>
    <div id="addItemForm" class="hidden bg-white p-4 rounded shadow mb-4 text-sm grid grid-cols-2 gap-3">
      <select id="newItemCat" class="border rounded px-2 py-1 col-span-2">
        ${cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
      </select>
      <input id="newItemName" placeholder="Name" class="border rounded px-2 py-1">
      <input id="newItemPrice" placeholder="Price (₹)" type="number" class="border rounded px-2 py-1">
      <input id="newItemDesc" placeholder="Description" class="border rounded px-2 py-1 col-span-2">
      <select id="newItemVeg" class="border rounded px-2 py-1">
        <option value="true">Veg 🟢</option><option value="false">Non-Veg 🔴</option>
      </select>
      <button onclick="addMenuItem()" class="bg-green-900 text-white rounded px-3 py-1">Save</button>
    </div>`;
    cats.forEach(cat => {
      html += `<div class="mb-6">
        <h3 class="font-semibold text-green-800 text-sm uppercase tracking-wider mb-2">${cat.name}</h3>
        <div class="bg-white rounded shadow overflow-hidden">
        <table class="w-full text-sm"><tbody>
          ${cat.items.map(i => `<tr class="border-t hover:bg-gray-50">
            <td class="p-3">${i.isVeg ? '🟢' : '🔴'} ${i.name}</td>
            <td class="p-3 text-gray-500 text-xs max-w-xs">${i.description}</td>
            <td class="p-3 font-medium">₹${i.price}</td>
            <td class="p-3">${i.isAvailable ? '<span class="text-green-700 text-xs">Available</span>' : '<span class="text-red-500 text-xs">Unavailable</span>'}</td>
            <td class="p-3 flex gap-2">
              <button onclick="showEditItem(${i.id})" class="text-xs bg-green-900 text-white px-2 py-1 rounded">Edit</button>
              <button onclick="toggleItemAvail(${i.id}, ${!i.isAvailable})" class="text-xs bg-gray-100 px-2 py-1 rounded">${i.isAvailable ? 'Disable' : 'Enable'}</button>
              <button onclick="deleteMenuItem(${i.id})" class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded">Delete</button>
            </td>
          </tr>
          <tr id="itemEdit${i.id}" class="hidden bg-yellow-50 border-t">
            <td colspan="5" class="p-3">
              <div class="grid grid-cols-1 md:grid-cols-4 gap-2 items-center">
                <input id="iName${i.id}" value="${esc(i.name)}" placeholder="Name" class="border rounded px-2 py-1">
                <input id="iDesc${i.id}" value="${esc(i.description)}" placeholder="Description" class="border rounded px-2 py-1 md:col-span-2">
                <input id="iPrice${i.id}" type="number" value="${i.price}" placeholder="Price ₹" class="border rounded px-2 py-1">
                <select id="iVeg${i.id}" class="border rounded px-2 py-1">
                  <option value="true" ${i.isVeg ? 'selected' : ''}>Veg 🟢</option>
                  <option value="false" ${!i.isVeg ? 'selected' : ''}>Non-Veg 🔴</option>
                </select>
                <button onclick="saveItem(${i.id})" class="text-xs bg-green-900 text-white px-3 py-1 rounded">Save</button>
                <button onclick="tabs.menu()" class="text-xs bg-gray-200 px-3 py-1 rounded">Cancel</button>
              </div>
            </td>
          </tr>`).join('')}
        </tbody></table></div></div>`;
    });
    document.getElementById('tabContent').innerHTML = html;
  },

  rooms: async () => {
    const rooms = await apiFetch('/admin/rooms');
    document.getElementById('tabContent').innerHTML = `
      <h2 class="font-bold text-lg mb-3 text-green-900">Rooms (${rooms.length})</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        ${rooms.map(r => `<div class="bg-white rounded shadow p-4">
          <div id="roomView${r.id}">
            <img src="${esc((r.images || [])[0] || '')}" class="w-full h-28 object-cover rounded mb-2" onerror="this.style.display='none'">
            <div class="flex justify-between items-start mb-2">
              <h3 class="font-semibold text-green-900">${r.name}</h3>
              <span class="text-xs ${r.isActive ? 'text-green-600' : 'text-red-500'}">${r.isActive ? 'Active' : 'Inactive'}</span>
            </div>
            <p class="text-xs text-gray-500 mb-2">${r.description.substring(0, 100)}…</p>
            <p class="font-bold text-green-800 mb-1">₹${r.pricePerNight.toLocaleString('en-IN')}/night</p>
            <p class="text-xs text-gray-500 mb-3">Max: ${r.maxOccupancy} guests</p>
            <div class="flex gap-2">
              <button onclick="showEditRoom(${r.id})" class="text-xs bg-green-900 text-white px-3 py-1 rounded flex-1">Edit</button>
              <button onclick="toggleRoom(${r.id}, ${!r.isActive})" class="text-xs bg-gray-100 px-3 py-1 rounded flex-1">${r.isActive ? 'Deactivate' : 'Activate'}</button>
            </div>
          </div>
          <div id="roomEdit${r.id}" class="hidden text-sm space-y-2">
            <label class="block text-xs text-gray-500">Room name</label>
            <input id="rName${r.id}" value="${esc(r.name)}" class="border rounded px-2 py-1 w-full">
            <label class="block text-xs text-gray-500">Price per night (₹)</label>
            <input id="rPrice${r.id}" type="number" value="${r.pricePerNight}" class="border rounded px-2 py-1 w-full">
            <label class="block text-xs text-gray-500">Max guests</label>
            <input id="rOcc${r.id}" type="number" value="${r.maxOccupancy}" class="border rounded px-2 py-1 w-full">
            <label class="block text-xs text-gray-500">Description</label>
            <textarea id="rDesc${r.id}" rows="3" class="border rounded px-2 py-1 w-full">${esc(r.description)}</textarea>
            <label class="block text-xs text-gray-500">Photo URL</label>
            <input id="rImg${r.id}" value="${esc((r.images || [])[0] || '')}" class="border rounded px-2 py-1 w-full">
            <div class="flex gap-2 pt-1">
              <button onclick="saveRoom(${r.id})" class="text-xs bg-green-900 text-white px-3 py-1 rounded flex-1">Save</button>
              <button onclick="tabs.rooms()" class="text-xs bg-gray-200 px-3 py-1 rounded flex-1">Cancel</button>
            </div>
          </div>
        </div>`).join('')}
      </div>`;
  },

  gallery: async () => {
    const imgs = await apiFetch('/admin/gallery');
    document.getElementById('tabContent').innerHTML = `
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-bold text-lg text-green-900">Gallery (${imgs.length} images)</h2>
      </div>
      <div class="bg-white p-4 rounded shadow mb-4 text-sm grid grid-cols-1 md:grid-cols-4 gap-3">
        <input id="newImgUrl" placeholder="Image URL" class="border rounded px-2 py-1 md:col-span-2">
        <input id="newImgCaption" placeholder="Caption" class="border rounded px-2 py-1">
        <select id="newImgCat" class="border rounded px-2 py-1">
          <option value="general">General</option><option value="rooms">Rooms</option>
          <option value="dining">Dining</option><option value="events">Events</option>
        </select>
        <button onclick="addGalleryImage()" class="bg-green-900 text-white rounded px-3 py-1 col-span-1">Add Image</button>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        ${imgs.map(img => `<div class="bg-white rounded shadow overflow-hidden">
          <img src="${img.url}" class="w-full h-32 object-cover" onerror="this.src='https://via.placeholder.com/300x200?text=Image'">
          <div class="p-2">
            <p class="text-xs text-gray-600 truncate">${img.caption || '–'}</p>
            <p class="text-xs text-green-700 uppercase">${img.category}</p>
            <button onclick="deleteGalleryImage(${img.id})" class="text-xs text-red-600 mt-1 hover:underline">Delete</button>
          </div>
        </div>`).join('')}
      </div>`;
  },

  reviews: async () => {
    const data = await apiFetch('/admin/reviews');
    document.getElementById('tabContent').innerHTML = `
      <h2 class="font-bold text-lg mb-3 text-green-900">Reviews (${data.length})</h2>
      <div class="space-y-3">
        ${data.map(r => `<div class="bg-white rounded shadow p-4 flex justify-between items-start gap-4">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <span class="font-semibold text-sm">${r.name}</span>
              <span class="text-yellow-500 text-xs">${'★'.repeat(r.rating)}</span>
              ${r.approved ? '<span class="text-xs text-green-600 font-semibold">Approved</span>' : '<span class="text-xs text-orange-500 font-semibold">Pending</span>'}
            </div>
            ${r.title ? `<p class="font-medium text-sm text-gray-800">${r.title}</p>` : ''}
            <p class="text-sm text-gray-600">${r.body}</p>
          </div>
          <div class="flex flex-col gap-2 flex-shrink-0">
            ${!r.approved ? `<button onclick="approveReview(${r.id})" class="text-xs bg-green-100 text-green-800 px-3 py-1 rounded whitespace-nowrap">Approve</button>` : ''}
            <button onclick="deleteReview(${r.id})" class="text-xs bg-red-100 text-red-700 px-3 py-1 rounded">Delete</button>
          </div>
        </div>`).join('')}
      </div>`;
  },

  enquiries: async () => {
    const data = await apiFetch('/admin/enquiries');
    document.getElementById('tabContent').innerHTML = `
      <h2 class="font-bold text-lg mb-3 text-green-900">Contact Enquiries (${data.length})</h2>
      <div class="space-y-3">
        ${data.map(e => `<div class="bg-white rounded shadow p-4 ${!e.read ? 'border-l-4 border-yellow-400' : ''}">
          <div class="flex justify-between items-start">
            <div>
              <span class="font-semibold text-sm">${e.name}</span>
              <span class="text-gray-400 text-xs ml-2">${e.email}${e.phone ? ' / ' + e.phone : ''}</span>
              ${!e.read ? '<span class="ml-2 text-xs text-yellow-600 font-semibold">NEW</span>' : ''}
            </div>
            <span class="text-xs text-gray-400">${new Date(e.createdAt).toLocaleDateString()}</span>
          </div>
          <p class="font-medium text-sm mt-1">${e.subject}</p>
          <p class="text-sm text-gray-600 mt-1">${e.message}</p>
          <div class="flex gap-2 mt-2">
            ${!e.read ? `<button onclick="markRead(${e.id})" class="text-xs bg-gray-100 px-3 py-1 rounded">Mark Read</button>` : ''}
            <button onclick="deleteEnquiry(${e.id})" class="text-xs bg-red-100 text-red-700 px-3 py-1 rounded">Delete</button>
          </div>
        </div>`).join('')}
      </div>`;
  },

  newsletter: async () => {
    const data = await apiFetch('/admin/newsletter');
    document.getElementById('tabContent').innerHTML = `
      <h2 class="font-bold text-lg mb-3 text-green-900">Newsletter Subscribers (${data.length})</h2>
      <div class="bg-white rounded shadow overflow-hidden">
      <table class="w-full text-sm"><thead class="bg-gray-100">
        <tr><th class="p-3 text-left">Email</th><th class="p-3 text-left">Name</th><th class="p-3 text-left">Date</th><th class="p-3 text-left">Action</th></tr>
      </thead><tbody>
        ${data.map(s => `<tr class="border-t hover:bg-gray-50">
          <td class="p-3">${s.email}</td>
          <td class="p-3 text-gray-500">${s.name || '–'}</td>
          <td class="p-3 text-gray-400 text-xs">${new Date(s.createdAt).toLocaleDateString()}</td>
          <td class="p-3"><button onclick="deleteSubscriber(${s.id})" class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded">Remove</button></td>
        </tr>`).join('')}
      </tbody></table></div>`;
  },
};

async function updateStatus(type, id, status) {
  try {
    await apiFetch(`/admin/${type}/${id}/status`, { method: 'PATCH', body: JSON.stringify({ status }) });
    tabs[type]();
    loadDashboard();
  } catch (e) { alert(e.error || 'Error'); }
}

function showAddMenuItem() {
  document.getElementById('addItemForm').classList.toggle('hidden');
}

async function addMenuItem() {
  try {
    await apiFetch('/admin/menu/items', { method: 'POST', body: JSON.stringify({
      categoryId: document.getElementById('newItemCat').value,
      name: document.getElementById('newItemName').value,
      description: document.getElementById('newItemDesc').value,
      price: document.getElementById('newItemPrice').value,
      isVeg: document.getElementById('newItemVeg').value === 'true',
    })});
    tabs.menu();
  } catch (e) { alert(e.error || 'Error'); }
}

async function toggleItemAvail(id, isAvailable) {
  await apiFetch(`/admin/menu/items/${id}`, { method: 'PUT', body: JSON.stringify({ isAvailable }) });
  tabs.menu();
}

async function deleteMenuItem(id) {
  if (!confirm('Delete this menu item?')) return;
  await apiFetch(`/admin/menu/items/${id}`, { method: 'DELETE' });
  tabs.menu();
}

async function toggleRoom(id, isActive) {
  await apiFetch(`/admin/rooms/${id}`, { method: 'PUT', body: JSON.stringify({ isActive }) });
  tabs.rooms();
}

function showEditRoom(id) {
  document.getElementById(`roomView${id}`).classList.add('hidden');
  document.getElementById(`roomEdit${id}`).classList.remove('hidden');
}

async function saveRoom(id) {
  const img = document.getElementById(`rImg${id}`).value.trim();
  try {
    await apiFetch(`/admin/rooms/${id}`, { method: 'PUT', body: JSON.stringify({
      name: document.getElementById(`rName${id}`).value.trim(),
      pricePerNight: document.getElementById(`rPrice${id}`).value,
      maxOccupancy: document.getElementById(`rOcc${id}`).value,
      description: document.getElementById(`rDesc${id}`).value.trim(),
      images: img ? [img] : [],
    })});
    tabs.rooms();
  } catch (e) { alert(e.error || 'Could not save room'); }
}

function showEditItem(id) {
  document.getElementById(`itemEdit${id}`).classList.toggle('hidden');
}

async function saveItem(id) {
  try {
    await apiFetch(`/admin/menu/items/${id}`, { method: 'PUT', body: JSON.stringify({
      name: document.getElementById(`iName${id}`).value.trim(),
      description: document.getElementById(`iDesc${id}`).value.trim(),
      price: document.getElementById(`iPrice${id}`).value,
      isVeg: document.getElementById(`iVeg${id}`).value === 'true',
    })});
    tabs.menu();
  } catch (e) { alert(e.error || 'Could not save item'); }
}

async function addGalleryImage() {
  try {
    await apiFetch('/admin/gallery', { method: 'POST', body: JSON.stringify({
      url: document.getElementById('newImgUrl').value,
      caption: document.getElementById('newImgCaption').value,
      category: document.getElementById('newImgCat').value,
    })});
    tabs.gallery();
  } catch (e) { alert(e.error || 'Error'); }
}

async function deleteGalleryImage(id) {
  if (!confirm('Delete this image?')) return;

  tabs.gallery();
}

  await apiFetch(`/admin/reviews/${id}/approve`, { method: 'PATCH' });

}

async function deleteReview(id) {
